<!DOCTYPE html>
<html>
<head><title>RBZID Test</title></head>
<body>
  <h1>RBZID Anti-Bot Test</h1>
  <p>Galaw mo mouse mo tapos click verify</p>
  <button onclick="verify()">Verify</button>
  <p id="result"></p>

  <script>
    let mouse = [];
    document.onmousemove = e => mouse.push([e.clientX, e.clientY]);
    
    async function verify() {
      const res = await fetch('/api/verify', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          fingerprint: {
            canvas: 'real',
            mouse: mouse.slice(-50)
          }
        })
      });
      const data = await res.json();
      document.getElementById('result').innerText = 'Token mo: ' + data.rbzid;
    }
  </script>
</body>
</html>
