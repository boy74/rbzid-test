<!DOCTYPE html>
<html>
<head><title>RBZID Test</title></head>
<body>
  <h1>RBZID Anti-Bot Test</h1>
  <p>Galaw mo mouse mo tapos click verify</p>
  <button onclick="verify()">Verify</button>
  <p id="result"></p>

  <script>
    let mouse = [];
    document.onmousemove = e => mouse.push([e.clientX, e.clientY]);
    
    function verify() {
    // Direct save na, walang API call
    const token = "rbzid_" + Date.now();
    localStorage.setItem('rbzid_token', token);
    document.getElementById('result').innerText = 'Verified! Token: ' + token;
}
